<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="style6.css">
<body>
    <h3>Fale com agente</h3>
    <div class="caixa">
<div class="group">
         <form action="/submit" method="POST">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" placeholder="Nome completo" required>
            </div>

            <div class="form-group">
                <label for="data_nascimento">Data de Nascimento:</label>
                <input type="date" id="data_nascimento" name="data_nascimento" required>
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="telefone">Telefone:</label>
                <input type="tel" id="telefone" name="telefone" required>
            </div>

             <script src="https://cdn.jsdelivr.net/npm/tinymce@6/tinymce.min.js" referrerpolicy="origin"></script>
            <script>
    
                tinymce.init({
                    selector: '#comentarios', 
                    plugins: 'lists link image code preview', 
                    toolbar: 'undo redo | styles | bold italic underline | alignleft aligncenter alignright alignjustify | bullist numlist outdent indent | link image | preview',
                    language: 'pt_BR', 
                    menubar: false, 
                    height: 320
                });

            </script>

            <div class="form-group">
                <label for="comentarios">Comentários:</label><br>
                <textarea id="comentarios" name="comentarios" rows="4" cols="50"></textarea>
            </div>

            
            <div class="form-group">
                
                <button type="submit" id="Enviar" name="Enviar">Enviar</button>
                
            </div>
               
             

            </div>
            </form>

          </div>

          <a href="index.html">Voltar</a>
</body>
</html>
